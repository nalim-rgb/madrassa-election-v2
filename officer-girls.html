<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Officer Panel (Girls) - Madrassa Election</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="bismillah">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div>
        <div class="school-title">1997-I-Ulamudheen Higher Secondary Madrassa Election 2026</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="booth-label" style="background:#ec4899; color:white">Officer Panel (Girls)</div>
            <h2>Voter Activity Status</h2>
            <p style="margin-bottom:2rem; color:var(--text-secondary)">Boxes light up green automatically when a user
                successfully votes for that position.</p>

            <div id="status-grid" class="status-grid"></div>

            <div style="text-align:center; font-size:1.5rem; margin-bottom:2rem; font-weight:800;">Voters Processed:
                <span id="voters-count" style="color:var(--primary-color);">0</span></div>

            <div id="error-msg" class="message"></div>
            <button id="btn-start" class="btn" onclick="startNewVoter()"
                style="padding: 1.5rem; font-size: 1.5rem;">Start New Voter</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="candidates.js"></script>
    <script src="app.js"></script>
    <script>
        initOfficer('girls');
        function unlockKiosk() {
            if (document.getElementById('kiosk-pin').value === 'NM4321') {
                document.getElementById('kiosk-lock').style.display = 'none';
            } else {
                document.getElementById('kiosk-error').style.display = 'block';
                setTimeout(() => document.getElementById('kiosk-error').style.display = 'none', 2000);
            }
        }
    </script>

    <!-- Kiosk Lock Screen -->
    <div id="kiosk-lock"
        style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#f8fafc;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🔒</div>
        <h2 style="margin-bottom: 2rem; color:var(--text-primary); font-family: 'Outfit', sans-serif;">Officer Panel
            Locked</h2>
        <input type="password" id="kiosk-pin" placeholder="Enter PIN"
            style="font-size: 1.5rem; padding: 1rem; text-align: center; width: 250px; margin-bottom: 1rem; border-radius: 8px; border: 2px solid #cbd5e1;">
        <button class="btn" onclick="unlockKiosk()" style="width: 250px; background-color: #ec4899;">Unlock
            Panel</button>
        <p id="kiosk-error" style="color: red; margin-top: 1rem; display: none; font-weight: bold;">Incorrect PIN</p>
    </div>
</body>

</html>
